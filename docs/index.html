<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCHaagenti - Documentation Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(245, 245, 245, 0.8) 0%, rgba(211, 211, 211, 0.5) 100%);
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333333;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(192, 192, 192, 0.8);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-top: 0;
            color: #1a1a1a;
            border-bottom: 1px solid silver;
            padding-bottom: 15px;
            font-size: 1.8em;
        }

        p {
            color: #555555;
            margin-bottom: 30px;
        }

        .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .project-list li {
            margin-bottom: 15px;
        }

        .project-link {
            display: block;
            padding: 15px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid silver;
            border-radius: 8px;
            text-decoration: none;
            color: #333333;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .project-link:hover {
            background-color: #ffffff;
            border-color: #a0a0a0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85em;
            color: #777777;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MCHaagenti Projects</h1>
        <p>Welcome to the official documentation portal. Select a project below to read its documentation.</p>
        
        <ul class="project-list">
            <li>
                <a href="docs/mctrade/index.html" class="project-link">MCTrade Documentation</a>
            </li>
            </ul>

        <div class="footer">
            &copy; 2026 MCHaagenti. All rights reserved.
        </div>
    </div>

</body>
</html>
